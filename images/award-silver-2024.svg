<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="Kelowna Now Best of Kelowna — Silver 2024">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="40%" stop-color="#C0C0C0"/>
      <stop offset="60%" stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="silverRibbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8B8B8"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <radialGradient id="silverShine" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ribbon tails -->
  <polygon points="60,135 50,225 80,205 100,225 100,160" fill="url(#silverRibbon)" stroke="#666" stroke-width="0.8"/>
  <polygon points="140,135 150,225 120,205 100,225 100,160" fill="url(#silverRibbon)" stroke="#666" stroke-width="0.8"/>
  <!-- Outer medallion -->
  <circle cx="100" cy="100" r="78" fill="url(#silver)" stroke="#666" stroke-width="2"/>
  <!-- Laurel wreath left -->
  <path d="M40 100 Q 35 70 55 50 M 45 90 Q 38 78 48 65 M 50 105 Q 40 95 42 80" stroke="#666" stroke-width="1.5" fill="none"/>
  <ellipse cx="50" cy="60" rx="6" ry="3" fill="#888" transform="rotate(-30 50 60)"/>
  <ellipse cx="46" cy="75" rx="6" ry="3" fill="#888" transform="rotate(-20 46 75)"/>
  <ellipse cx="44" cy="90" rx="6" ry="3" fill="#888" transform="rotate(-10 44 90)"/>
  <ellipse cx="46" cy="105" rx="6" ry="3" fill="#888" transform="rotate(0 46 105)"/>
  <ellipse cx="52" cy="120" rx="6" ry="3" fill="#888" transform="rotate(15 52 120)"/>
  <!-- Laurel wreath right -->
  <ellipse cx="150" cy="60" rx="6" ry="3" fill="#888" transform="rotate(30 150 60)"/>
  <ellipse cx="154" cy="75" rx="6" ry="3" fill="#888" transform="rotate(20 154 75)"/>
  <ellipse cx="156" cy="90" rx="6" ry="3" fill="#888" transform="rotate(10 156 90)"/>
  <ellipse cx="154" cy="105" rx="6" ry="3" fill="#888" transform="rotate(0 154 105)"/>
  <ellipse cx="148" cy="120" rx="6" ry="3" fill="#888" transform="rotate(-15 148 120)"/>
  <!-- Inner medallion -->
  <circle cx="100" cy="100" r="58" fill="#F2F2F2" stroke="#888" stroke-width="1.2"/>
  <!-- Shine -->
  <circle cx="100" cy="100" r="58" fill="url(#silverShine)"/>
  <!-- Star -->
  <polygon points="100,55 105,70 121,70 108,80 113,95 100,86 87,95 92,80 79,70 95,70" fill="#666"/>
  <!-- Text -->
  <text x="100" y="115" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="11" fill="#444" letter-spacing="1">BEST OF</text>
  <text x="100" y="129" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="14" fill="#333" letter-spacing="0.5">KELOWNA</text>
  <text x="100" y="148" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="9" fill="#666" letter-spacing="2.5">SILVER · 2024</text>
</svg>
